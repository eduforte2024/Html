<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Animes</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #202024;
            --primary-color: #8257e5;
            --text-color: #e1e1e6;
            --text-muted: #a8a8b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        /* Controles (Abas e Filtros) */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto 30px auto;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #29292e;
            color: var(--text-color);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--primary-color);
        }

        .filters {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, input {
            background: #29292e;
            color: var(--text-color);
            border: 1px solid #4d4d57;
            padding: 8px;
            border-radius: 5px;
            outline: none;
        }

        /* Grade de Animes */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .anime-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #29292e;
            transition: transform 0.2s;
        }

        .anime-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .anime-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .anime-info {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            background: #29292e;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .badge.popular {
            background: #f1c40f;
            color: #000;
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

        let currentTab = 'assistidos';

        // Alterna entre as abas de status
        function switchTab(tabName) {
            currentTab = tabName;
            
            // Atualiza classe ativa dos botões
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            applyFilters();
        }

        // Renderiza e filtra os cards na tela
        function applyFilters() {
            const sortVal = document.getElementById('sortSelect').value;
            const filterPopVal = document.getElementById('filterPopular').value;
            const searchVal = document.getElementById('searchBar').value.toLowerCase();
            const grid = document.getElementById('animeGrid');
            
            grid.innerHTML = ''; // Limpa a tela

            // 1. Filtra por Aba, Pesquisa e Popularidade
            let filteredAnimes = animeData.filter(anime => {
                const matchesTab = anime.status === currentTab;
                const matchesSearch = anime.title.toLowerCase().includes(searchVal);
                const matchesPopular = filterPopVal === 'all' || (filterPopVal === 'popular' && anime.popular);
                
                return matchesTab && matchesSearch && matchesPopular;
            });

            // 2. Aplica Ordenação
            if (sortVal === 'az') {
                filteredAnimes.sort((a, b) => a.title.localeCompare(b.title));
            } else if (sortVal === 'za') {
                filteredAnimes.sort((a, b) => b.title.localeCompare(a.title));
            } else if (sortVal === 'ep') {
                filteredAnimes.sort((a, b) => b.eps - a.eps);
            }

            // 3. Cria os elementos HTML na tela
            filteredAnimes.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                
                card.innerHTML = `
                    <div>
                        <div class="anime-title">${anime.title}</div>
                        <div class="anime-info">Episódios: ${anime.eps || '??'}</div>
                    </div>
                    <div>
                        ${anime.popular ? '<span class="badge popular">🔥 Popular</span>' : '<span class="badge">Padrão</span>'}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Inicializa a página mostrando a primeira aba
        applyFilters();
